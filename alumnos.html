<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Alumnos | Escuela de Skate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/CSS/styles.css">

<!-- =========================
FIX BOTÓN + RESPONSIVE
========================= -->
<style>

/* BOTÓN REGRESAR */
.btn-regresar-fixed{
    position: fixed;
    top: 20px;
    left: 20px;
    background: #fff;
    color: #000;
    border: none;
    padding: 10px 18px;
    font-size: 0.85rem;
    font-weight: 700;
    border-radius: 10px;
    z-index: 9999;
    cursor: pointer;
}

/* GRID RESPONSIVE */
.alumnos-grid{
    margin-top: 60px;
}

.nivel-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
}

/* TARJETAS */
.alumno-card img{
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* MODAL RESPONSIVE */
.modal-box{
    max-height: 90vh;
    overflow-y: auto;
}

/* INPUT FIX MOBILE */
input, textarea, select{
    font-size: 16px;
}

/* =========================
TABLETS
========================= */
@media (max-width: 900px){

.nivel-grid{
    grid-template-columns: repeat(2, 1fr);
}

}

/* =========================
CELULARES
========================= */
@media (max-width: 600px){

.btn-regresar-fixed{
    top: 12px;
    left: 12px;
    padding: 8px 14px;
    font-size: 0.75rem;
}

.nivel-grid{
    grid-template-columns: 1fr;
}

.alumno-card img{
    height: 150px;
}

.modal-box{
    width: 95%;
    padding: 20px;
}

.panel-buttons{
    flex-direction: column;
    gap: 15px;
}

.btn{
    width: 100%;
}

}

/* CELULARES PEQUEÑOS */
@media (max-width: 400px){

.alumno-card img{
    height: 130px;
}

}

</style>

</head>

<body>

<!-- BOTÓN -->
<button
class="btn-regresar-fixed"
onclick="window.location.href='panel.html'">
← Regresar
</button>

<section class="skaters">

<h1>Alumnos registrados</h1>

<!-- TOTAL -->
<div class="total-alumnos-box">
<span class="total-label">Alumnos</span>
<span id="totalAlumnos" class="total-numero">0</span>
</div>

<!-- BOTONES -->
<div class="panel-buttons">

<button class="btn" id="btnAgregar">Agregar</button>

<button class="btn" id="btnEliminar" style="background:#333;">
Eliminar
</button>

<button class="btn" style="background:#457b9d;"
onclick="window.location.href='asistencia.html'">
Asistencia
</button>

<button class="btn" style="background:#457b9d;"
onclick="window.location.href='planeacion.html'">
Planeación
</button>

<button class="btn" style="background:#000;color:#fff;"
onclick="window.location.href='trucos.html'">
Trucos
</button>

</div>

<!-- GRID -->
<div id="alumnosGrid" class="alumnos-grid"></div>

</section>

<!-- MODAL -->
<div id="modalAlumno" class="modal">

<div class="modal-box">

<h2>Nuevo Alumno</h2>

<input type="text" id="nombre" placeholder="Nombre" required>
<input type="text" id="apellido" placeholder="Apellido" required>

<select id="nivel" required>
<option value="">Seleccionar nivel</option>
<option value="Principiante">Principiante</option>
<option value="Intermedio">Intermedio</option>
<option value="Avanzado">Avanzado</option>
</select>

<textarea id="obsespirituales" placeholder="Observaciones espirituales"></textarea>
<textarea id="obsMedica" placeholder="Observaciones médicas"></textarea>

<input type="file" id="foto" accept=".jpg,.jpeg,.png">

<img id="previewImg" style="width:100%; margin-top:10px; border-radius:10px; display:none;">

<button class="btn" id="guardarAlumno">
Guardar
</button>

</div>

</div>

<!-- PREVIEW -->
<script>
const fotoInput = document.getElementById("foto");
const preview = document.getElementById("previewImg");

fotoInput.addEventListener("change", () => {
  const file = fotoInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = "block";
  };

  reader.readAsDataURL(file);
});
</script>

<script type="module" src="/js/alumnos.js"></script>

</body>
</html>
